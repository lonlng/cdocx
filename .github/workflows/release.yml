name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PACKAGE_NAME: cdocx

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
