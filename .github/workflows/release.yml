name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PACKAGE_NAME: cdocx

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: extract-version
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build Release static library
        run: |
          cmake -B build_rel_static `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_rel_static --config Release --parallel
          cmake --install build_rel_static --config Release --prefix "temp/rel_static" --component cdocx

      - name: Build Release shared library
        run: |
          cmake -B build_rel_shared `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_rel_shared --config Release --parallel
          cmake --install build_rel_shared --config Release --prefix "temp/rel_shared" --component cdocx

      - name: Build Debug static library
        run: |
          cmake -B build_dbg_static `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_static --config Debug --parallel
          cmake --install build_dbg_static --config Debug --prefix "temp/dbg_static" --component cdocx

      - name: Build Debug shared library
        run: |
          cmake -B build_dbg_shared `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_shared --config Debug --parallel
          cmake --install build_dbg_shared --config Debug --prefix "temp/dbg_shared" --component cdocx

      - name: Package artifacts
        shell: pwsh
        run: |
          $version = "${{ needs.extract-version.outputs.version }}"
          $staging = "cdocx-$version-windows-msvc-x64"
          New-Item -ItemType Directory -Path "$staging/include/cdocx", "$staging/lib", "$staging/debug/lib" -Force

          # Headers (Release and Debug share the same headers)
          Copy-Item -Path "temp/rel_static/include/cdocx.h" -Destination "$staging/include/"
          Copy-Item -Path "temp/rel_static/include/cdocx/*.h" -Destination "$staging/include/cdocx/"

          # Release libraries
          Copy-Item -Path "temp/rel_static/lib/cdocx.lib" -Destination "$staging/lib/cdocx_static.lib"
          Copy-Item -Path "temp/rel_shared/lib/cdocx.lib" -Destination "$staging/lib/cdocx.lib"
          Copy-Item -Path "temp/rel_shared/bin/cdocx.dll" -Destination "$staging/lib/cdocx.dll"

          # Debug libraries
          Copy-Item -Path "temp/dbg_static/lib/cdocx.lib" -Destination "$staging/debug/lib/cdocx_static.lib"
          Copy-Item -Path "temp/dbg_shared/lib/cdocx.lib" -Destination "$staging/debug/lib/cdocx.lib"
          Copy-Item -Path "temp/dbg_shared/bin/cdocx.dll" -Destination "$staging/debug/lib/cdocx.dll"

          # Create zip
          Compress-Archive -Path "$staging" -DestinationPath "$staging.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: cdocx-*-windows-msvc-x64.zip

  build-linux:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build Release static library
        run: |
          cmake -B build_rel_static \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_rel_static --parallel
          cmake --install build_rel_static --prefix "temp/rel_static" --component cdocx

      - name: Build Release shared library
        run: |
          cmake -B build_rel_shared \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_rel_shared --parallel
          cmake --install build_rel_shared --prefix "temp/rel_shared" --component cdocx

      - name: Build Debug static library
        run: |
          cmake -B build_dbg_static \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_static --parallel
          cmake --install build_dbg_static --prefix "temp/dbg_static" --component cdocx

      - name: Build Debug shared library
        run: |
          cmake -B build_dbg_shared \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_shared --parallel
          cmake --install build_dbg_shared --prefix "temp/dbg_shared" --component cdocx

      - name: Package artifacts
        run: |
          version="${{ needs.extract-version.outputs.version }}"
          staging="cdocx-${version}-linux-gcc-x64"
          mkdir -p "${staging}/include/cdocx" "${staging}/lib" "${staging}/debug/lib"

          # Headers (Release and Debug share the same headers)
          cp "temp/rel_static/include/cdocx.h" "${staging}/include/"
          cp -r "temp/rel_static/include/cdocx/"* "${staging}/include/cdocx/"

          # Release libraries
          cp "temp/rel_static/lib/libcdocx.a" "${staging}/lib/"
          cp "temp/rel_shared/lib/libcdocx.so" "${staging}/lib/"

          # Debug libraries
          cp "temp/dbg_static/lib/libcdocx.a" "${staging}/debug/lib/"
          cp "temp/dbg_shared/lib/libcdocx.so" "${staging}/debug/lib/"

          # Create tar.gz
          tar czf "${staging}.tar.gz" "${staging}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: cdocx-*-linux-gcc-x64.tar.gz

  release:
    needs: [extract-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
