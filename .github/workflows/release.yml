name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PACKAGE_NAME: cdocx

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: extract-version
    runs-on: windows-2022
    strategy:
      matrix:
        config: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build static library
        run: |
          cmake -B build_static `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_static --config ${{ matrix.config }} --parallel
          cmake --install build_static --config ${{ matrix.config }} --prefix "temp/static" --component cdocx

      - name: Build shared library
        run: |
          cmake -B build_shared `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_shared --config ${{ matrix.config }} --parallel
          cmake --install build_shared --config ${{ matrix.config }} --prefix "temp/shared" --component cdocx

      - name: Package artifacts
        shell: pwsh
        run: |
          $version = "${{ needs.extract-version.outputs.version }}"
          $config = "${{ matrix.config }}".ToLower()
          $staging = "cdocx-$version-windows-msvc-x64-$config"
          New-Item -ItemType Directory -Path "$staging/include/cdocx" -Force
          New-Item -ItemType Directory -Path "$staging/lib" -Force

          # Install static library (rename to avoid conflict)
          Copy-Item -Path "temp/static/lib/cdocx.lib" -Destination "$staging/lib/cdocx_static.lib"

          # Install shared library files
          Copy-Item -Path "temp/shared/lib/cdocx.lib" -Destination "$staging/lib/cdocx.lib"
          Copy-Item -Path "temp/shared/bin/cdocx.dll" -Destination "$staging/lib/cdocx.dll"

          # Install headers
          Copy-Item -Path "temp/static/include/cdocx.h" -Destination "$staging/include/"
          Copy-Item -Path "temp/static/include/cdocx/*.h" -Destination "$staging/include/cdocx/"

          # Create zip
          Compress-Archive -Path "$staging" -DestinationPath "$staging.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.config }}
          path: cdocx-*-windows-msvc-x64-*.zip

  build-linux:
    needs: extract-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [Release, Debug]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build static library
        run: |
          cmake -B build_static \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_static --parallel
          cmake --install build_static --prefix "temp/static" --component cdocx

      - name: Build shared library
        run: |
          cmake -B build_shared \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.config }} \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_shared --parallel
          cmake --install build_shared --prefix "temp/shared" --component cdocx

      - name: Package artifacts
        run: |
          version="${{ needs.extract-version.outputs.version }}"
          config=$(echo "${{ matrix.config }}" | tr '[:upper:]' '[:lower:]')
          staging="cdocx-${version}-linux-gcc-x64-${config}"
          mkdir -p "${staging}/lib"

          # Install static library
          cp "temp/static/lib/libcdocx.a" "${staging}/lib/"

          # Install shared library
          cp "temp/shared/lib/libcdocx.so" "${staging}/lib/"

          # Install headers
          cp -r "temp/static/include/"* "${staging}/"

          # Create tar.gz
          tar czf "${staging}.tar.gz" "${staging}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.config }}
          path: cdocx-*-linux-gcc-x64-*.tar.gz

  release:
    needs: [extract-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
