name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PACKAGE_NAME: cdocx

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: extract-version
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build and install Release
        run: |
          $staging = "cdocx-${{ needs.extract-version.outputs.version }}-windows-msvc-x64"
          if (Test-Path $staging) { Remove-Item -Recurse -Force $staging }

          cmake --preset ci-windows-release-static
          cmake --build --preset ci-windows-release-static --parallel
          cmake --install build/ci-windows-release-static --config Release --prefix "$staging" --component cdocx

          cmake --preset ci-windows-release-shared
          cmake --build --preset ci-windows-release-shared --parallel
          cmake --install build/ci-windows-release-shared --config Release --prefix "$staging" --component cdocx

      - name: Build and install Debug
        run: |
          $staging = "cdocx-${{ needs.extract-version.outputs.version }}-windows-msvc-x64"

          cmake --preset ci-windows-debug-static
          cmake --build --preset ci-windows-debug-static --parallel
          cmake --install build/ci-windows-debug-static --config Debug --prefix "$staging/debug" --component cdocx

          cmake --preset ci-windows-debug-shared
          cmake --build --preset ci-windows-debug-shared --parallel
          cmake --install build/ci-windows-debug-shared --config Debug --prefix "$staging/debug" --component cdocx

      - name: Package artifacts
        shell: pwsh
        run: |
          $staging = "cdocx-${{ needs.extract-version.outputs.version }}-windows-msvc-x64"
          Compress-Archive -Path "$staging" -DestinationPath "$staging.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: cdocx-*-windows-msvc-x64.zip

  build-linux:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build and install Release
        run: |
          staging="cdocx-${{ needs.extract-version.outputs.version }}-linux-gcc-x64"
          rm -rf "$staging"

          cmake --preset ci-linux-release-static
          cmake --build --preset ci-linux-release-static --parallel
          cmake --install build/ci-linux-release-static --prefix "$staging" --component cdocx

          cmake --preset ci-linux-release-shared
          cmake --build --preset ci-linux-release-shared --parallel
          cmake --install build/ci-linux-release-shared --prefix "$staging" --component cdocx

      - name: Build and install Debug
        run: |
          staging="cdocx-${{ needs.extract-version.outputs.version }}-linux-gcc-x64"

          cmake --preset ci-linux-debug-static
          cmake --build --preset ci-linux-debug-static --parallel
          cmake --install build/ci-linux-debug-static --prefix "$staging/debug" --component cdocx

          cmake --preset ci-linux-debug-shared
          cmake --build --preset ci-linux-debug-shared --parallel
          cmake --install build/ci-linux-debug-shared --prefix "$staging/debug" --component cdocx

      - name: Package artifacts
        run: |
          staging="cdocx-${{ needs.extract-version.outputs.version }}-linux-gcc-x64"
          tar czf "${staging}.tar.gz" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: cdocx-*-linux-gcc-x64.tar.gz

  release:
    needs: [extract-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
