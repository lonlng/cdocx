name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  PACKAGE_NAME: cdocx

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ── Windows Builds ───────────────────────────────────────────────────────
  windows-static:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ci-windows-release-static
          - preset: ci-windows-debug-static
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      preset: ${{ matrix.preset }}
      os: windows-latest
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  windows-shared:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ci-windows-release-shared
          - preset: ci-windows-debug-shared
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      preset: ${{ matrix.preset }}
      os: windows-latest
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  # ── Linux Builds ─────────────────────────────────────────────────────────
  linux-static:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ci-linux-release-static
          - preset: ci-linux-debug-static
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      preset: ${{ matrix.preset }}
      os: ubuntu-latest
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  linux-shared:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ci-linux-release-shared
          - preset: ci-linux-debug-shared
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      preset: ${{ matrix.preset }}
      os: ubuntu-latest
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  # ── Create Release ───────────────────────────────────────────────────────
  release:
    needs: [extract-version, windows-static, windows-shared, linux-static, linux-shared]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          path: artifacts
          pattern: "ci-*-*"
          merge-multiple: false

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe14e6d4d2ab0f725bee52c124d42e5e01984  # v2.2.1
        with:
          name: ${{ github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
