name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PACKAGE_NAME: cdocx

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: extract-version
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build and install Release
        run: |
          $staging = "cdocx-${{ needs.extract-version.outputs.version }}-windows-msvc-x64"
          if (Test-Path $staging) { Remove-Item -Recurse -Force $staging }

          cmake -B build_static `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_static --config Release --parallel
          cmake --install build_static --config Release --prefix "$staging"

          cmake -B build_shared `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_shared --config Release --parallel
          cmake --install build_shared --config Release --prefix "$staging"

      - name: Build and install Debug
        run: |
          $staging = "cdocx-${{ needs.extract-version.outputs.version }}-windows-msvc-x64"

          cmake -B build_dbg_static `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_static --config Debug --parallel
          cmake --install build_dbg_static --config Debug --prefix "$staging/debug"

          cmake -B build_dbg_shared `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_TESTING=OFF `
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_shared --config Debug --parallel
          cmake --install build_dbg_shared --config Debug --prefix "$staging/debug"

      - name: Package artifacts
        shell: pwsh
        run: |
          $staging = "cdocx-${{ needs.extract-version.outputs.version }}-windows-msvc-x64"

          # Remove duplicate debug headers (shared with Release)
          if (Test-Path "$staging/debug/include") {
              Remove-Item -Recurse -Force "$staging/debug/include"
          }

          Compress-Archive -Path "$staging" -DestinationPath "$staging.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: cdocx-*-windows-msvc-x64.zip

  build-linux:
    needs: extract-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Build and install Release
        run: |
          staging="cdocx-${{ needs.extract-version.outputs.version }}-linux-gcc-x64"
          rm -rf "$staging"

          cmake -B build_rel_static \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_rel_static --parallel
          cmake --install build_rel_static --prefix "$staging"

          cmake -B build_rel_shared \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_rel_shared --parallel
          cmake --install build_rel_shared --prefix "$staging"

      - name: Build and install Debug
        run: |
          staging="cdocx-${{ needs.extract-version.outputs.version }}-linux-gcc-x64"

          cmake -B build_dbg_static \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_static --parallel
          cmake --install build_dbg_static --prefix "$staging/debug"

          cmake -B build_dbg_shared \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_SHARED_LIBS=ON \
            -DBUILD_TESTING=OFF \
            -DBUILD_EXAMPLES=OFF
          cmake --build build_dbg_shared --parallel
          cmake --install build_dbg_shared --prefix "$staging/debug"

      - name: Package artifacts
        run: |
          staging="cdocx-${{ needs.extract-version.outputs.version }}-linux-gcc-x64"

          # Remove duplicate debug headers (shared with Release)
          rm -rf "$staging/debug/include"

          tar czf "${staging}.tar.gz" "$staging"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: cdocx-*-linux-gcc-x64.tar.gz

  release:
    needs: [extract-version, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
