name: Release Artifacts

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  PACKAGE_NAME: cdocx

jobs:
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  # ── Windows Builds ───────────────────────────────────────────────────────
  windows-static:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            shared: OFF
          - build_type: Debug
            shared: OFF
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      os: windows-latest
      build_type: ${{ matrix.build_type }}
      shared: ${{ matrix.shared }}
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  windows-shared:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            shared: ON
          - build_type: Debug
            shared: ON
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      os: windows-latest
      build_type: ${{ matrix.build_type }}
      shared: ${{ matrix.shared }}
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  # ── Linux Builds ─────────────────────────────────────────────────────────
  linux-static:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            shared: OFF
          - build_type: Debug
            shared: OFF
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      os: ubuntu-latest
      build_type: ${{ matrix.build_type }}
      shared: ${{ matrix.shared }}
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  linux-shared:
    needs: extract-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Release
            shared: ON
          - build_type: Debug
            shared: ON
    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      os: ubuntu-latest
      build_type: ${{ matrix.build_type }}
      shared: ${{ matrix.shared }}
      run_tests: true
      run_install: true
      run_package: true
      upload_artifacts: true

  # ── Create Release ───────────────────────────────────────────────────────
  release:
    needs: [extract-version, windows-static, windows-shared, linux-static, linux-shared]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          name: ${{ github.ref_name }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
