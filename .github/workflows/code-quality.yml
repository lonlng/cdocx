name: Code Quality

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

    - name: Check formatting
      run: |
        find include src -type f \( -name "*.h" -o -name "*.cpp" \) -exec clang-format --dry-run --Werror {} \;

  static-analysis:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake cppcheck

    - name: Run cppcheck
      run: |
        cppcheck \
          --enable=all \
          --error-exitcode=1 \
          --inline-suppr \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          -I include \
          -I include/detail \
          src/ \
          2>&1 | head -100
