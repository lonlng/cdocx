name: Reusable CMake Workflow

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
        description: 'Runner OS (ubuntu-latest, windows-latest)'
      build_type:
        required: true
        type: string
        description: 'CMake build type (Debug, Release)'
      shared:
        required: true
        type: string
        description: 'BUILD_SHARED_LIBS value (ON, OFF)'
      run_tests:
        type: boolean
        default: true
        description: 'Run ctest after build'
      run_install:
        type: boolean
        default: true
        description: 'Run cmake --install and verify with install_test'
      run_package:
        type: boolean
        default: false
        description: 'Run cpack after build'
      upload_artifacts:
        type: boolean
        default: false
        description: 'Upload build artifacts'
      cc:
        type: string
        default: ''
        description: 'C compiler override (Linux only)'
      cxx:
        type: string
        default: ''
        description: 'C++ compiler override (Linux only)'

jobs:
  cmake:
    name: '${{ inputs.os }} ${{ inputs.build_type }} ${{ inputs.shared }}'
    runs-on: ${{ inputs.os }}
    timeout-minutes: 45

    env:
      CDOCX_INSTALL_PREFIX: '${{ github.workspace }}/install/${{ inputs.os }}-${{ inputs.build_type }}-${{ inputs.shared }}'
      BUILD_CONFIG: '${{ inputs.build_type }}'

    defaults:
      run:
        shell: bash

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive

      # ── Cache (ccache) ─────────────────────────────────────────────────────
      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03  # v1.2.23
        with:
          key: ${{ inputs.os }}-${{ inputs.build_type }}-${{ inputs.shared }}-${{ hashFiles('**/CMakeLists.txt', '**/cmake/*.cmake') }}
          restore-keys: |
            ${{ inputs.os }}-${{ inputs.build_type }}-${{ inputs.shared }}-

      # ── Setup Toolchain (Linux) ────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      # ── Setup Toolchain (Windows) ──────────────────────────────────────────
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce  # v2

      # ── Configure ──────────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            GENERATOR="Visual Studio 17 2022"
            ARCH="-A x64"
          else
            GENERATOR="Ninja"
            ARCH=""
          fi

          CONFIG_ARGS=""
          if [ -n "${{ inputs.cc }}" ]; then
            CONFIG_ARGS="${CONFIG_ARGS} -DCMAKE_C_COMPILER=${{ inputs.cc }}"
          fi
          if [ -n "${{ inputs.cxx }}" ]; then
            CONFIG_ARGS="${CONFIG_ARGS} -DCMAKE_CXX_COMPILER=${{ inputs.cxx }}"
          fi

          # shellcheck disable=SC2086
          cmake -S . -B build \
            -G "${GENERATOR}" ${ARCH} \
            -DCMAKE_BUILD_TYPE="${{ inputs.build_type }}" \
            -DBUILD_SHARED_LIBS="${{ inputs.shared }}" \
            -DBUILD_TESTING=ON \
            -DBUILD_EXAMPLES=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${CONFIG_ARGS}

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config "${{ inputs.build_type }}" --parallel

      # ── Test ───────────────────────────────────────────────────────────────
      - name: Test
        if: inputs.run_tests
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            export PATH="${{ github.workspace }}/build/${{ inputs.build_type }}:$PATH"
          fi
          ctest --test-dir build --build-config "${{ inputs.build_type }}" --output-on-failure --parallel

      # ── Install ────────────────────────────────────────────────────────────
      - name: Install
        if: inputs.run_install
        run: |
          cmake --install build \
                --config "${{ inputs.build_type }}" \
                --prefix "${{ env.CDOCX_INSTALL_PREFIX }}" \
                --strip

      # ── Verify Install ─────────────────────────────────────────────────────
      - name: Verify Install
        if: inputs.run_install
        run: |
          mkdir -p install_test_build
          cmake -S test/install_test \
                -B install_test_build \
                -D CMAKE_PREFIX_PATH="${{ env.CDOCX_INSTALL_PREFIX }}"
          cmake --build install_test_build

      # ── Package ────────────────────────────────────────────────────────────
      - name: Package
        if: inputs.run_package
        run: cpack --config build/CPackConfig.cmake -C "${{ inputs.build_type }}"

      # ── Upload Artifacts ───────────────────────────────────────────────────
      - name: Upload Build Artifacts
        if: inputs.upload_artifacts
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1  # v4.6.1
        with:
          name: ${{ inputs.os }}-${{ inputs.build_type }}-${{ inputs.shared }}
          path: |
            build/*.zip
            build/*.tar.gz
            ${{ env.CDOCX_INSTALL_PREFIX }}/
          if-no-files-found: ignore
