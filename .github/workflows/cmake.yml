name: CMake Build and Test

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux Matrix ─────────────────────────────────────────────────────────
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Debug
            shared: OFF
            cc: gcc
            cxx: g++
          - build_type: Debug
            shared: OFF
            cc: clang
            cxx: clang++
          - build_type: Release
            shared: OFF
            cc: gcc
            cxx: g++
          - build_type: Release
            shared: OFF
            cc: clang
            cxx: clang++
          - build_type: Debug
            shared: ON
            cc: gcc
            cxx: g++
          - build_type: Release
            shared: ON
            cc: gcc
            cxx: g++

    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      os: ubuntu-latest
      build_type: ${{ matrix.build_type }}
      shared: ${{ matrix.shared }}
      cc: ${{ matrix.cc }}
      cxx: ${{ matrix.cxx }}
      run_tests: true
      run_install: true

  # ── Windows Matrix ───────────────────────────────────────────────────────
  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: Debug
            shared: OFF
          - build_type: Debug
            shared: ON
          - build_type: Release
            shared: OFF
          - build_type: Release
            shared: ON

    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      os: windows-latest
      build_type: ${{ matrix.build_type }}
      shared: ${{ matrix.shared }}
      run_tests: true
      run_install: true
