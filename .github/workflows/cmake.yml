name: CMake Build and Test

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - build_type: Debug
            compiler: gcc
            cc: gcc
            cxx: g++
            preset: ci-linux-debug-static
          - build_type: Release
            compiler: gcc
            cc: gcc
            cxx: g++
            preset: ci-linux-release-static
          - build_type: Debug
            compiler: clang
            cc: clang
            cxx: clang++
            preset: ci-linux-debug-static
          - build_type: Release
            compiler: clang
            cc: clang
            cxx: clang++
            preset: ci-linux-release-static

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Configure CMake
      run: |
        cmake --preset ${{ matrix.preset }} \
          -D BUILD_TESTING=ON \
          -D BUILD_EXAMPLES=ON \
          -D CMAKE_C_COMPILER=${{ matrix.cc }} \
          -D CMAKE_CXX_COMPILER=${{ matrix.cxx }}

    - name: Build
      run: cmake --build --preset ${{ matrix.preset }} --parallel

    - name: Test
      run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - build_type: Debug
            arch: x64
            preset: ci-windows-debug-static
          - build_type: Release
            arch: x64
            preset: ci-windows-release-static

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v2

    - name: Configure CMake
      run: |
        cmake --preset ${{ matrix.preset }} `
          -D BUILD_TESTING=ON `
          -D BUILD_EXAMPLES=ON

    - name: Build
      run: cmake --build --preset ${{ matrix.preset }} --parallel

    - name: Test
      run: ctest --test-dir build/${{ matrix.preset }} -C ${{ matrix.build_type }} --output-on-failure
