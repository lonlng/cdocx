name: CMake Build and Test

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux Matrix ─────────────────────────────────────────────────────────
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ci-linux-debug-static
            cc: gcc
            cxx: g++
          - preset: ci-linux-debug-static
            cc: clang
            cxx: clang++
          - preset: ci-linux-release-static
            cc: gcc
            cxx: g++
          - preset: ci-linux-release-static
            cc: clang
            cxx: clang++
          - preset: ci-linux-debug-shared
            cc: gcc
            cxx: g++
          - preset: ci-linux-release-shared
            cc: gcc
            cxx: g++

    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      preset: ${{ matrix.preset }}
      os: ubuntu-latest
      cc: ${{ matrix.cc }}
      cxx: ${{ matrix.cxx }}
      run_tests: true
      run_install: true

  # ── Windows Matrix ───────────────────────────────────────────────────────
  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: ci-windows-debug-static
          - preset: ci-windows-debug-shared
          - preset: ci-windows-release-static
          - preset: ci-windows-release-shared

    uses: ./.github/workflows/_reusable-cmake.yml
    with:
      preset: ${{ matrix.preset }}
      os: windows-latest
      run_tests: true
      run_install: true
