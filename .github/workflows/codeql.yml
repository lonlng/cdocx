name: CodeQL Security Analysis

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    # Run weekly on Sundays at 03:00 UTC
    - cron: '0 3 * * 0'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive

      # ── Initialize CodeQL ──────────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v3.28.17
        with:
          languages: cpp
          queries: security-extended,security-and-quality

      # ── Install Build Tools ────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      # ── Build (CodeQL traces compilation) ──────────────────────────────────
      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON -DBUILD_EXAMPLES=ON
          cmake --build build --config Release --parallel

      # ── Perform CodeQL Analysis ────────────────────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v3.28.17
        with:
          category: /language:cpp
