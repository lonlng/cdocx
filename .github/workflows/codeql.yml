name: CodeQL Security Analysis

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    # Run weekly on Sundays at 03:00 UTC
    - cron: '0 3 * * 0'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze C++
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive

      # ── Initialize CodeQL ──────────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@0fa1882f994fbd81a47ab0804f93354f5ea40147  # v3.28.17
        with:
          languages: cpp
          queries: security-extended,security-and-quality
          # Optional: specify a custom config file
          # config-file: ./.github/codeql/codeql-config.yml

      # ── Install Build Tools ────────────────────────────────────────────────
      - name: Install CMake
        run: |
          pip install cmake>=3.30
          cmake --version

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      # ── Build (CodeQL traces compilation) ──────────────────────────────────
      - name: Build
        run: |
          cmake --preset ci-linux-release-static
          cmake --build --preset ci-linux-release-static --parallel

      # ── Perform CodeQL Analysis ────────────────────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@60168efe1c415ce0f5521ea06d928646c8ade653  # v3.28.17
        with:
          category: /language:cpp
